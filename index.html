<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Insight</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      color: #222;
    }

    h1 {
      text-align: center;
      font-weight: 600;
      margin-bottom: 30px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #007aff;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #0063cc;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #f0f4ff;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

  <h1>Stock Insight</h1>

  <div class="container">
    <input id="symbolInput" type="text" placeholder="Enter stock symbol (AAPL, INFY, TSLA)">
    <button onclick="fetchStock()">Get Data</button>

    <div id="output" class="result"></div>
  </div>

  <script>
    async function fetchStock() {
      const symbol = document.getElementById("symbolInput").value.trim();
      if (!symbol) return;

      const url = `https://small-art-5ed0.johnap81.workers.dev/?symbol=${symbol}`;

      const response = await fetch(url);
      const data = await response.json();

      document.getElementById("output").textContent =
        JSON.stringify(data, null, 2);
    }
  </script>

</body>
</html>
