<!doctype html>
<html lang="en" data-build="2.58">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0c1224" />
    <meta
      name="description"
      content="John’sStockApp — search, quotes, watchlist, portfolios (PWA)."
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.svg" />
    <link rel="stylesheet" href="/styles.css?v=2.58" />
    <title>John’sStockApp</title>
  </head>
  <body>
    <div class="app">
      <header class="siteHead">
        <div class="bar">
          <div class="brand">
            <a class="brandHome" href="#/search" aria-label="John’sStockApp — home (Search)">
              <svg
                class="logo"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 64 64"
                width="36"
                height="36"
                aria-hidden="true"
                focusable="false"
              >
                <defs>
                  <linearGradient id="bbLogoGrad" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0" stop-color="#0d9488" />
                    <stop offset="0.5" stop-color="#6366f1" />
                    <stop offset="1" stop-color="#6d28d9" />
                  </linearGradient>
                </defs>
                <rect width="64" height="64" rx="16" fill="url(#bbLogoGrad)" />
                <g fill="rgba(255,255,255,0.96)">
                  <path d="M6 18 L10 8 L12 9 L10 20 L8 20 Z M14 8 L20 4 L22 6 L16 20 L12 20 Z" />
                  <ellipse cx="20" cy="32" rx="10" ry="12" />
                  <path
                    d="M20 20 Q28 16 32 24 Q30 20 20 20Z"
                    opacity="0.9"
                  />
                </g>
                <g fill="rgba(255,255,255,0.94)">
                  <circle cx="44" cy="20" r="4" />
                  <circle cx="56" cy="20" r="4" />
                  <ellipse cx="50" cy="32" rx="12" ry="11" />
                  <ellipse
                    cx="50"
                    cy="36"
                    rx="7"
                    ry="4"
                    fill="rgba(0,0,0,0.2)"
                  />
                </g>
                <line
                  x1="32"
                  y1="6"
                  x2="32"
                  y2="58"
                  stroke="rgba(255,255,255,0.25)"
                  stroke-width="1"
                />
              </svg>
              <div class="brandText">
                <div class="title">John’sStockApp</div>
                <div class="sub">Search · Quote · Watchlist · Portfolio</div>
              </div>
            </a>
          </div>
          <nav class="nav" aria-label="Main">
            <a class="navlink" href="#/search" data-route>Search</a>
            <a class="navlink" href="#/watchlist" data-route>Watchlist</a>
            <a class="navlink" href="#/portfolio" data-route data-pf-nav>Portfolio</a>
            <a class="navlink" href="#/notes" data-route>Notes</a>
          </nav>
          <div class="actions">
            <a
              class="btn healthTopBtn"
              href="/api/health"
              target="_blank"
              rel="noopener"
              id="linkApiHealth"
              title="Opens in a new tab. You should see JSON with ok: true when the server is running."
              >API health</a>
            <button type="button" class="btn ghost" id="btnInstall" hidden>Install</button>
            <button type="button" class="btn ghost" id="btnTheme">Theme</button>
          </div>
        </div>
      </header>

      <main class="main">
        <div id="globalApiBanner" class="globalApiBanner" role="region" aria-live="polite" hidden></div>
        <section class="panel" id="view"></section>
      </main>

      <footer class="foot">
        <span>v2.58</span>
        <span class="footLinks">
          <a href="/mobile.html">Phone (same Wi-Fi)</a>
          <a href="/README.html#checklist-daily">Run checklist</a>
          <a href="/README.html#python3-explained">What is python3?</a>
          <a class="footHealth" href="/api/health" target="_blank" rel="noopener">API health (opens new tab)</a>
          <a href="/README.html">Help</a>
        </span>
      </footer>
    </div>
    <script type="module" src="/app.js?v=2.58"></script>
  </body>
</html>
