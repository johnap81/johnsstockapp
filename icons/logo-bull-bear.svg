<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d9488"/>
      <stop offset="0.5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#lg)"/>
  <!-- Bull (left): horns + muzzle — “bull market” -->
  <g fill="rgba(255,255,255,0.96)">
    <path d="M6 18 L10 8 L12 9 L10 20 L8 20 Z M14 8 L20 4 L22 6 L16 20 L12 20 Z"/>
