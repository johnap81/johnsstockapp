    <path d="M20 20 Q28 16 32 24 Q30 20 20 20Z" opacity="0.9"/>
  </g>
  <!-- Bear (right): round ears + snout — “bear market” -->
  <g fill="rgba(255,255,255,0.94)">
    <circle cx="44" cy="20" r="4"/>
    <circle cx="56" cy="20" r="4"/>
    <ellipse cx="50" cy="32" rx="12" ry="11"/>
    <ellipse cx="50" cy="36" rx="7" ry="4" fill="rgba(0,0,0,0.2)"/>
  </g>
  <line x1="32" y1="6" x2="32" y2="58" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
</svg>
